<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>Ваш гайд готов</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f4f7; font-family:Arial, Helvetica, sans-serif; color:#1a1a1a;">

    <tr>
        <td align="center">
            <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:12px; overflow:hidden;">
                <tr>
                    <td style="padding:40px 40px 16px 40px;">

                </tr>
                <tr>

                    </td>
                </tr>
                <tr>
                    <td style="padding:0 40px 32px 40px;">
                        <a href="%LINK%"
                           style="display:inline-block; background-color:#1a1a1a; color:#ffffff; text-decoration:none; padding:14px 28px; border-radius:8px; font-size:16px; font-weight:bold;">
                            Открыть гайд

                    </td>
                </tr>
                <tr>
                    <td style="padding:0 40px 40px 40px; font-size:13px; line-height:1.6; color:#888;">

                        <a href="%LINK%" style="color:#888;">%LINK%</a>
                    </td>
                </tr>
            </table>
            <table role="presentation" width="560" cellpadding="0" cellspacing="0">
                <tr>
                    <td style="padding:16px 40px; font-size:12px; color:#aaa; text-align:center;">
                        anyforms.ru

        </td>
