server.port=8090

allowed.origins=${ALLOWED_ORIGINS}
url.back=${URL_BACK}

amocrm.subdomain=${AMOCRM_SUBDOMAIN}
amocrm.access.token=${AMOCRM_ACCESS_TOKEN}
amocrm.calculate.price.base.amount=${AMOCRM_CALCULATE_BASE_AMOUNT}
amocrm.calculate.price.margin.project=${AMOCRM_CALCULATE_PRICE_MARGIN_PROJECT}
amocrm.calculate.price.margin.form=${AMOCRM_CALCULATE_PRICE_MARGIN_FORM}
amocrm.landing.responsible.user.id=${AMOCRM_LANDING_RESPONSIBLE_USER_ID}
amocrm.landing.pipeline.id=${AMOCRM_LANDING_PIPELINE_ID}
amocrm.landing.status.id=${AMOCRM_LANDING_STATUS_ID}

google.sheets.spreadsheet.id=${GOOGLE_SHEETS_SPREADSHEET_ID}
google.sheets.sheet.name=${GOOGLE_SHEETS_SPREADSHEET_NAME}
google.sheets.credentials.json=${GOOGLE_APPLICATION_CREDENTIALS}

amocrm.status.paid.id=${AMOCRM_STATUS_PAID_ID}
amocrm.status.ready.to.ship.id=${AMOCRM_STATUS_READY_TO_SHIP_ID}

sdek.secret.key=${SDEK_SECRET_KEY}
sdek.client.id=${SDEK_CLIENT_ID}
sdek.webhook.url=${SDEK_WEBHOOK_URL}
sdek.auto.subscribe=true

# PostgreSQL Database Configuration
spring.datasource.url=${POSTGRES_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

spring.task.scheduling.pool.size=5

# JPA/Hibernate Configuration
# validate: схему ведут только Flyway-миграции, Hibernate лишь проверяет соответствие entity ↔ БД
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# S3 Configuration (public bucket, no signing)
s3.bucket.name=${S3_BUCKET_NAME}
s3.region=${S3_REGION}
s3.endpoint=${S3_ENDPOINT}
s3.access-key-id=${S3_ACCESS_KEY_ID}
s3.secret-access-key=${S3_SECRET_ACCESS_KEY}

# JWT (срок жизни токена по умолчанию 30 дней, 2592000 сек)
# JWT_SECRET должен быть не менее 32 символов для HS256
jwt.secret=${JWT_SECRET}
jwt.expiration.seconds=${JWT_EXPIRATION_SECONDS}

salesbot.scheduler.enabled=true
salesbot.scheduler.tick-ms=30000
salesbot.jitter.max-minutes=30
salesbot.lock.key=911007

amocrm.min-request-interval-ms=200

# Платежи (Юкасса)
payment.yookassa.shop.id=${PAYMENT_YOOKASSA_SHOP_ID}
payment.yookassa.api.key=${PAYMENT_YOOKASSA_API_KEY}
# Домен по умолчанию для страницы успеха (если не определился из Origin/returnUrl запроса).
# Путь страницы успеха задаётся per-product в таблице payment_product.success_url_path.
payment.default-domain=${PAYMENT_DEFAULT_DOMAIN}
payment.allowed-return-hosts=${PAYMENT_ALLOWED_RETURN_HOSTS}

product.guide.url=${PRODUCT_GUIDE_URL}
product.course.url=${PRODUCT_COURSE_URL}

# Email (NotiSend)
email.notisend.api.key=${EMAIL_NOTISEND_API_KEY}
email.notisend.email.address=${EMAIL_NOTISEND_EMAIL_ADDRESS}
email.notisend.from.name=${EMAIL_NOTISEND_FROM_NAME}

# Фоновые таски (очередь писем): операционные константы — хардкод
tasks.batch-size=50
tasks.fixed-rate-ms=5000
tasks.initial-delay-ms=10000
